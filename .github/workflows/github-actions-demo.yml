name: MFP CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: docker/setup-buildx-action@v3

      - run: docker build -t favorite_places_server:latest ./server

      - run: docker build -t favorite_places_client:latest ./client