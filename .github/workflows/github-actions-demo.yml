name: MFP CI

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install backend dependencies
        working-directory: ./server
        run: npm install

      - name: Run backend tests
        working-directory: ./server
        run: npm test

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend Docker image
        run: docker build -t ghcr.io/a5hura666/favorite_places_server:latest ./server

      - name: Build frontend Docker image
        run: docker build -t ghcr.io/a5hura666/favorite_places_client:latest ./client

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push backend image
        run: docker push ghcr.io/a5hura666/favorite_places_server:latest

      - name: Push frontend image
        run: docker push ghcr.io/a5hura666/favorite_places_client:latest